readme = "README.md"
requires-python = ">=3.13"
dependencies = [
    "aiolimiter>=1.2.1",
    "anyio>=4.12.1",
    "async-lru>=2.3.0",
    "diskcache>=5.6.3",
    "filetype>=1.2.0",
