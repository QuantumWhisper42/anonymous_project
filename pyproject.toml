    "huggingface-hub>=1.14.0",
    "logfire[httpx]>=4.29.0",
    "minijinja>=2.18.0",
    "mwclient>=0.11.0",
    "pillow>=12.1.1",
    "pydantic>=2.12.5",
    "pydantic-ai-slim[google,web,retries]>=1.70.0",
    "pydantic-graph>=1.70.0",
    "resvg-py>=0.2.6",
    "rich>=14.3.3",
